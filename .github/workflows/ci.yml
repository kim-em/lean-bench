name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: leanprover/lean-action@v1
        with:
          # The default `lake build` covers the whole defaultTargets list:
          # the LeanBench library, all three example libs+exes (Fib, Sort,
          # BinarySearch), the LeanBenchTest library (whose `#guard_msgs`
          # blocks in LeanBenchTestSetupErrors.lean are checked at build
          # time), and every test exe.
          build-args: ""
          test: false
          use-github-cache: true

      # Test exes: each exits non-zero on failure.
      - name: roundtrip test
        shell: bash
        run: ./.lake/build/bin/roundtrip_benchmark_test

      - name: verify-command test
        shell: bash
        run: ./.lake/build/bin/verify_benchmark_test

      - name: kill-path test (pure-Lean child-kill timeout)
        shell: bash
        run: ./.lake/build/bin/kill_path_benchmark_test

      - name: config-overrides test
        shell: bash
        run: ./.lake/build/bin/config_benchmark_test

      - name: fixed-benchmark test (kill path for setup_fixed_benchmark)
        shell: bash
        run: ./.lake/build/bin/fixed_benchmark_test

      - name: child-outcome classifier test (parent failure-mode units)
        shell: bash
        run: ./.lake/build/bin/child_outcome_benchmark_test

      - name: format regression test (pinned report layout)
        shell: bash
        run: ./.lake/build/bin/format_benchmark_test

      - name: cli-errors test (parser + dispatch error paths)
        shell: bash
        run: ./.lake/build/bin/cli_errors_benchmark_test

      - name: schema-stability test (issue #14: required keys + version policy)
        shell: bash
        run: ./.lake/build/bin/schema_benchmark_test

      - name: ci-budgeted suite test (issue #9: --total-seconds, budget_status)
        shell: bash
        run: ./.lake/build/bin/suite_benchmark_test

      - name: end-to-end run/compare test
        shell: bash
        run: ./.lake/build/bin/e2e_benchmark_test

      # End-to-end smoke tests: `list` exercises the registry +
      # `initialize` blocks; `verify` spawns each registered benchmark's
      # child path against `f 0` / `f 1` and is bounded by the spec's
      # maxSecondsPerCall, so it cannot hang CI.
      - name: fib example list & verify
        shell: bash
        run: |
          ./.lake/build/bin/fib_benchmark_example list
          ./.lake/build/bin/fib_benchmark_example verify

      # Live CLI override smoke test: `run` with declaration-time
      # override flags must execute, honour the passed
      # --param-ceiling, and exit cleanly. This is a real
      # cross-platform check that the override-flag pipeline works
      # end-to-end after a compile (the lean-side test exercises the
      # parser; this one exercises the spawned binary). The second
      # invocation pins `--param-schedule doubling` so the new flag
      # is exercised end-to-end on every CI run, not just the
      # parser-level test.
      - name: fib example run with CLI overrides
        shell: bash
        run: |
          ./.lake/build/bin/fib_benchmark_example run \
            LeanBench.Examples.Fib.goodFib \
            --max-seconds-per-call 0.5 \
            --param-ceiling 1024 \
            --slope-tolerance 0.5
          ./.lake/build/bin/fib_benchmark_example run \
            LeanBench.Examples.Fib.goodFib \
            --max-seconds-per-call 0.5 \
            --param-ceiling 256 \
            --param-schedule doubling \
            --slope-tolerance 0.5

      # CI-budgeted suite smoke test (issue #9). Exercises the
      # `suite` subcommand end-to-end including the `--export` JSONL
      # path against a real registry. We pick a `--total-seconds`
      # value generous enough that at least one benchmark completes
      # — that's the row tooling cares about. The synthetic
      # skip-row shape has dedicated coverage in
      # `suite_benchmark_test`; this CI step's job is to confirm the
      # CLI wiring (parser, exporter, file write) works end-to-end on
      # every supported platform.
      - name: fib example suite with CLI budget
        shell: bash
        run: |
          ./.lake/build/bin/fib_benchmark_example suite \
            --total-seconds 10 \
            --max-seconds-per-call 0.5 \
            --param-ceiling 256 \
            --export suite-results.jsonl
          grep -q '"budget_status":"completed"' suite-results.jsonl

      - name: sort example list & verify
        shell: bash
        run: |
          ./.lake/build/bin/sort_benchmark_example list
          ./.lake/build/bin/sort_benchmark_example verify

      - name: binary-search example list & verify
        shell: bash
        run: |
          ./.lake/build/bin/binary_search_benchmark_example list
          ./.lake/build/bin/binary_search_benchmark_example verify
