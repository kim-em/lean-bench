name = "lean-bench"
version = "0.1.0"
defaultTargets = [
  "LeanBench",
  "LeanBenchExampleFib", "fib_benchmark_example",
  "LeanBenchExampleSort", "sort_benchmark_example",
  "binary_search_benchmark_example",
  "fixed_benchmark_example",
  "LeanBenchTest", "roundtrip_benchmark_test", "verify_benchmark_test",
  "kill_path_benchmark_test", "config_benchmark_test",
  "fixed_benchmark_test",
  "child_outcome_benchmark_test", "format_benchmark_test",
  "e2e_benchmark_test", "cli_errors_benchmark_test",
  "schema_benchmark_test", "cache_mode_benchmark_test",
  "advisory_benchmark_test",
]

[[require]]
name = "Cli"
git = "https://github.com/mhuisi/lean4-cli.git"
rev = "main"

[[lean_lib]]
name = "LeanBench"

# --- examples ---
# Lib and exe names are deliberately verbose so they don't collide
# with what a downstream user might want to call their own targets.

[[lean_lib]]
name = "LeanBenchExampleFib"
srcDir = "examples/Fib"
roots = ["LeanBenchExampleFib"]

[[lean_exe]]
name = "fib_benchmark_example"
srcDir = "examples/Fib"
root = "LeanBenchExampleFibMain"

[[lean_lib]]
name = "LeanBenchExampleSort"
srcDir = "examples/Sort"
roots = ["LeanBenchExampleSort"]

[[lean_exe]]
name = "sort_benchmark_example"
srcDir = "examples/Sort"
root = "LeanBenchExampleSortMain"

[[lean_exe]]
name = "binary_search_benchmark_example"
srcDir = "examples/BinarySearch"
root = "LeanBenchExampleBinarySearchMain"

[[lean_exe]]
name = "fixed_benchmark_example"
srcDir = "examples/Fixed"
root = "LeanBenchExampleFixed"

# --- tests ---

[[lean_lib]]
name = "LeanBenchTest"
srcDir = "test"
roots = ["LeanBenchTestSetupErrors"]

[[lean_exe]]
name = "roundtrip_benchmark_test"
srcDir = "test"
root = "LeanBenchTestRoundtrip"

[[lean_exe]]
name = "verify_benchmark_test"
srcDir = "test"
root = "LeanBenchTestVerify"

[[lean_exe]]
name = "kill_path_benchmark_test"
srcDir = "test"
root = "LeanBenchTestKillPath"

[[lean_exe]]
name = "config_benchmark_test"
srcDir = "test"
root = "LeanBenchTestConfig"

[[lean_exe]]
name = "fixed_benchmark_test"
srcDir = "test"
root = "LeanBenchTestFixed"

[[lean_exe]]
name = "child_outcome_benchmark_test"
srcDir = "test"
root = "LeanBenchTestChildOutcome"

[[lean_exe]]
name = "format_benchmark_test"
srcDir = "test"
root = "LeanBenchTestFormat"

[[lean_exe]]
name = "e2e_benchmark_test"
srcDir = "test"
root = "LeanBenchTestE2E"

[[lean_exe]]
name = "cli_errors_benchmark_test"
srcDir = "test"
root = "LeanBenchTestCliErrors"

[[lean_exe]]
name = "schema_benchmark_test"
srcDir = "test"
root = "LeanBenchTestSchema"

[[lean_exe]]
name = "cache_mode_benchmark_test"
srcDir = "test"
root = "LeanBenchTestCacheMode"

[[lean_exe]]
name = "advisory_benchmark_test"
srcDir = "test"
root = "LeanBenchTestAdvisory"
