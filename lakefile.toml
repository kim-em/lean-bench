name = "lean-bench"
version = "0.1.0"
defaultTargets = [
  "LeanBench",
  "LeanBenchExampleFib", "fib_benchmark_example",
  "LeanBenchExampleSort", "sort_benchmark_example",
  "binary_search_benchmark_example",
  "LeanBenchTest", "roundtrip_benchmark_test", "verify_benchmark_test",
  "kill_path_benchmark_test",
]

[[require]]
name = "Cli"
git = "https://github.com/mhuisi/lean4-cli.git"
rev = "main"

[[lean_lib]]
name = "LeanBench"

# --- examples ---
# Lib and exe names are deliberately verbose so they don't collide
# with what a downstream user might want to call their own targets.

[[lean_lib]]
name = "LeanBenchExampleFib"
srcDir = "examples/Fib"
roots = ["LeanBenchExampleFib"]

[[lean_exe]]
name = "fib_benchmark_example"
srcDir = "examples/Fib"
root = "LeanBenchExampleFibMain"

[[lean_lib]]
name = "LeanBenchExampleSort"
srcDir = "examples/Sort"
roots = ["LeanBenchExampleSort"]

[[lean_exe]]
name = "sort_benchmark_example"
srcDir = "examples/Sort"
root = "LeanBenchExampleSortMain"

[[lean_exe]]
name = "binary_search_benchmark_example"
srcDir = "examples/BinarySearch"
root = "LeanBenchExampleBinarySearchMain"

# --- tests ---

[[lean_lib]]
name = "LeanBenchTest"
srcDir = "test"
roots = ["LeanBenchTestSetupErrors"]

[[lean_exe]]
name = "roundtrip_benchmark_test"
srcDir = "test"
root = "LeanBenchTestRoundtrip"

[[lean_exe]]
name = "verify_benchmark_test"
srcDir = "test"
root = "LeanBenchTestVerify"

[[lean_exe]]
name = "kill_path_benchmark_test"
srcDir = "test"
root = "LeanBenchTestKillPath"
